figure_eight_turtle:
  ros__parameters:
    # 小海龟使用的速度控制话题。
    cmd_vel_topic: /turtle1/cmd_vel

    # 圆周半径=线速度/角速度。
    linear_velocity: 2.0
    angular_velocity: 1.5

    # Twist速度指令的发布频率。
    publish_rate_hz: 30.0

    # 启动后等待一小段时间，确保turtlesim初始化完成。
    initial_delay_sec: 0.8

    # 0表示持续绘制8字形轨迹。
    figure_eight_repetitions: 0

    # false表示先逆时针运动。
    start_clockwise: false

    # 在启动终端中按下退出键（q），可停止小海龟并退出程序。
    keyboard_quit_enabled: true
    quit_key: q
